name: Release Validation

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xifty-rust-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyRust
    env:
      XIFTY_CORE_DIR: ${{ github.workspace }}/XIFty
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtyRust

      - name: Check out core repo
        uses: actions/checkout@v5
        with:
          repository: XIFtySense/XIFty
          path: XIFty

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo package list
        run: cargo package --list

      - name: Cargo publish dry-run
        run: cargo publish --dry-run
