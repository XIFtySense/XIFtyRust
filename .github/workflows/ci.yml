name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: xifty-rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyRust
    env:
      XIFTY_CORE_DIR: ${{ github.workspace }}/XIFtyRust/.xifty-core
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtyRust

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare core
        run: bash scripts/prepare-core.sh

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFtyRust/.xifty-core -> target
            XIFtyRust -> target

      - name: Run tests
        run: cargo test

      - name: Run examples
        run: |
          cargo run --example basic_usage
          cargo run --example gallery_ingest

      - name: Package dry-run
        run: cargo publish --dry-run
